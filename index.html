.chart-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--dim); margin-bottom: 12px; }
.log-wrap { padding: 16px 16px 24px; }

.btn-save:active { opacity: 0.8; }
.ac-list { position: absolute; background: var(--surface-3); border: 1px solid var(--border-2); border-radius: 8px; z-index: 50; width: 100%; top: 100%; left: 0; margin-top: 2px; }
.ac-item { padding: 10px 13px; cursor: pointer; font-size: 15px; } .ac-item:hover, .ac-item:active { background: var(--surface-2); }
.history-filters { display: flex; gap: 10px; padding: 12px 16px 6px; }
.fs-sm { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--ff-body); font-size: 13px; padding: 8px 11px; outline: none; -webkit-appearance: none; }
.history-summary { margin: 0 16px 8px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
.hs-label { font-size: 11px; color: var(--muted); } .hs-val { font-family: var(--ff-mono); font-size: 16px; font-weight: 500; }
.session-list { padding: 0 16px 8px; }
.scard { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.scard-info { flex: 1; min-width: 0; } .scard-venue { font-weight: 500; font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scard-meta { font-size: 11px; color: var(--muted); margin-top: 2px; } .scard-pnl { font-family: var(--ff-mono); font-size: 18px; font-weight: 600; white-space: nowrap; }
.scard-pnl.pos { color: var(--green); } .scard-pnl.neg { color: var(--red); } .scard-del { background: none; border: none; color: var(--dim); font-size: 20px; cursor: pointer; padding: 2px 4px; line-height: 1; }
.export-wrap { padding: 16px 16px 24px; } .export-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.export-card-title { font-family: var(--ff-disp); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; color: var(--gold-dim); margin-bottom: 5px; }

.btn-action { width: 100%; padding: 11px; background: var(--surface-3); border: 1px solid var(--border-2); border-radius: 8px; color: var(--text); font-family: var(--ff-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }

<div id="app">
<header class="app-header">
  <div class="app-logo">WOOLY'S <small>Poker Tracker</small></div>
  <div class="header-suits">&#9824; &#9827;</div>
</header>
<main id="main">
  <div class="view" id="view-dash"></div>
  <div class="view active" id="view-log">
    <div class="log-wrap">
      <div class="form-section-head">New Session</div>
      <div class="fg" id="cal-fg">
        <label>Date</label>
        <div class="cal-trigger" id="cal-trigger" onclick="toggleCal()">
          <span id="cal-display">Today</span><span class="cal-chevron">&#9660;</span>
        </div>
        <div class="cal-drop" id="cal-drop" style="display:none"></div>
        <input type="hidden" id="f-date">
      </div>
      <div class="fg" id="venue-fg">
        <label>Venue</label>
        <input type="text" class="fi" id="f-venue" placeholder="e.g. Potawatomi, Home Game" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="fg"><label>Game</label>
          <select class="fs" id="f-game">
            <option value="NLH">NLH</option><option value="PLO">PLO</option>
            <option value="PLO8">PLO8</option><option value="RxR">RxR</option>
            <option value="Mixed">Mixed</option><option value="Other">Other</option>
          </select>
        </div>
        <div class="fg"><label>Stakes</label><input type="text" class="fi" id="f-stakes" placeholder="1/2"></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Buy-in ($)</label><input type="number" class="fi" id="f-buyin" placeholder="300" min="0" inputmode="decimal"></div>
        <div class="fg"><label>Cash-out ($)</label><input type="number" class="fi" id="f-cashout" placeholder="520" min="0" inputmode="decimal"></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Hours</label><input type="number" class="fi" id="f-hours" placeholder="4" min="0" max="24" inputmode="numeric"></div>
        <div class="fg"><label>Minutes</label><input type="number" class="fi" id="f-mins" placeholder="30" min="0" max="59" inputmode="numeric"></div>
      </div>
      <div class="pnl-preview"><div class="pnl-eye">Result</div><div class="pnl-num" id="pnl-disp" style="color:var(--dim)">&mdash;</div></div>
      <button class="btn-save" id="save-btn" onclick="saveSession()">SAVE SESSION</button>
    </div>
  </div>
  <div class="view" id="view-hist">
    <div class="history-filters">
      <select class="fs-sm" id="filt-venue" onchange="renderHistory()"><option value="">All Venues</option></select>
      <select class="fs-sm" id="filt-game" onchange="renderHistory()"><option value="">All Games</option></select>
    </div>
    <div id="hist-summary"></div>
    <div class="session-list" id="sess-list"></div>
  </div>
  <div class="view" id="view-exp">
    <div class="export-wrap">
      <div class="form-section-head">Data &amp; Export</div>
      <div class="export-card"><div class="export-card-title">Export CSV</div><div class="export-card-desc">Download all sessions as a CSV for Google Sheets.</div><button class="btn-action" onclick="exportCSV()">&#11015;&nbsp; Download CSV</button></div>
      <div class="export-card"><div class="export-card-title">Export JSON Backup</div><div class="export-card-desc">Full backup of all data.</div><button class="btn-action" onclick="exportJSON()">&#11015;&nbsp; Download Backup</button></div>
      <div class="export-card"><div class="export-card-title">Import JSON Backup</div><div class="export-card-desc">Restore from a previous backup. Duplicates skipped.</div><input type="file" id="imp-file" accept=".json" style="display:none" onchange="importJSON(this)"><button class="btn-action" onclick="document.getElementById('imp-file').click()">&#11014;&nbsp; Import Backup</button></div>
      <div class="export-card"><div class="export-card-title" style="color:var(--red)">Danger Zone</div><div class="export-card-desc">Permanently delete all data. Export first!</div><button class="btn-action btn-danger" onclick="clearAll()">&#128465;&nbsp; Clear All Data</button></div>
    </div>
  </div>
</main>
<nav class="bottom-nav">
  <button class="nav-btn" id="nav-dash" onclick="showView('dash')"><span class="nav-icon">&#9824;</span><span class="nav-label">Stats</span></button>
  <button class="nav-btn active" id="nav-log" onclick="showView('log')"><span class="nav-icon" style="font-size:22px;font-weight:300">&#65291;</span><span class="nav-label">Log</span></button>
  <button class="nav-btn" id="nav-hist" onclick="showView('hist')"><span class="nav-icon">&#9827;</span><span class="nav-label">History</span></button>
  <button class="nav-btn" id="nav-exp" onclick="showView('exp')"><span class="nav-icon">&#9830;</span><span class="nav-label">Export</span></button>
</nav>
</div>

const today = new Date(); today.setHours(0,0,0,0);
const stored = JSON.parse(localStorage.getItem('felt_v1') || '[]');
let changed = false;
stored.forEach(s => {
  const d = new Date(s.date + 'T00:00:00');
  if (d > today) {
    const [y,m,day] = s.date.split('-').map(Number);
    try {
      const swapped = new Date(y, day-1, m);
      if (swapped <= today) { s.date = swapped.toISOString().slice(0,10); changed = true; }
    } catch(e) {}
  }
});
if (changed) localStorage.setItem('felt_v1', JSON.stringify(stored));
})();

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('main').scrollTop = 0;
  if (name === 'dash') renderDash();
  if (name === 'log') initLog();
  if (name === 'hist') renderHistory();
}

const fmtPnl = n => (n >= 0 ? '+$' : '-$') + Math.abs(Math.round(n)).toLocaleString();
const fmtAbs = n => '$' + Math.abs(Math.round(n)).toLocaleString();
const pnlCls = n => n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu';
const fmtDur = m => m ? `${Math.floor(m/60)}h ${m%60}m` : '';
const fmtDate = iso => {
  const [y,m,d] = iso.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const day = date.toLocaleDateString('en-US', {weekday:'long'});
  const month = date.toLocaleDateString('en-US', {month:'long'});
  const nth = n => n + (n%100>=11&&n%100<=13?'th':n%10===1?'st':n%10===2?'nd':n%10===3?'rd':'th');
  return `${day}, ${month} ${nth(d)} ${y}`;
};

let charts = {};
function renderDash() {
  const el = document.getElementById('view-dash');
  if (!sessions.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">&#9824;</div><div class="empty-title">No sessions yet</div><div class="empty-sub">Tap <strong style="color:var(--gold)">Log</strong> below to record<br>your first session.</div></div>`;
    return;
  }
  const sorted = [...sessions].sort((a,b) => a.date.localeCompare(b.date));
  const pnls = s => s.cashout - s.buyin;
  const total = sessions.reduce((s,x) => s + pnls(x), 0);
  const wins = sessions.filter(s => pnls(s) > 0).length;
  const wr = Math.round(wins / sessions.length * 100);
  const avgSes = total / sessions.length;
  const totalM = sessions.reduce((s,x) => s + (x.dur||0), 0);
  const hrs = (totalM/60).toFixed(1);
  const hourly = totalM > 0 ? total / (totalM/60) : null;
  const smap = {}, shmap = {};
  sessions.forEach(s => {
    const raw = s.stakes ? s.stakes : 'Unknown';
    if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return;
    const key = normStakes(raw);
    if (['$1/$2 PLO', '50c/$1'].includes(key)) return;
    smap[key] = (smap[key] || 0) + pnls(s);
    shmap[key] = (shmap[key] || 0) + (s.dur || 0);
  });
  const shourly = {};
  Object.keys(smap).forEach(k => { if (shmap[k] >= 60) shourly[k] = smap[k] / (shmap[k] / 60); });
  const recent = [...sessions].sort((a,b) => b.date.localeCompare(a.date));
  const firstW = pnls(recent[0]) > 0;

    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Win Rate</div><div class="stat-val ${wr>=50?'pos':'neg'}">${wr}%</div><div class="stat-sub">${wins}W &middot; ${sessions.length-wins}L</div></div>
      <div class="stat"><div class="stat-label">Avg / Session</div><div class="stat-val ${pnlCls(avgSes)}">${fmtPnl(avgSes)}</div><div class="stat-sub">per session</div></div>

    </div>`;
  Object.values(charts).forEach(c => c.destroy()); charts = {};

    let cum = 0;

    if (ctx1) charts.cum = new Chart(ctx1, {
      type: 'line',
      data: { labels: sorted.map(s => s.date.slice(5)), datasets: [{ data: cumData, borderColor: isPos ? '#22c55e' : '#f05050', backgroundColor: isPos ? 'rgba(34,197,94,0.06)' : 'rgba(240,80,80,0.06)', borderWidth: 2, fill: true, tension: 0.35, pointRadius: cumData.length > 40 ? 0 : 3, pointBackgroundColor: isPos ? '#22c55e' : '#f05050' }] },
      options: { ...cDefaults, scales: { x: xScale, y: yMono } }
    });
    if (Object.keys(shourly).length >= 1) {
      const gE = Object.entries(shourly).sort((a,b) => b[1]-a[1]);
      const ctx3 = document.getElementById('ch-game');
      if (ctx3) charts.game = new Chart(ctx3, {
        type: 'bar',
        data: { labels: gE.map(e => e[0]), datasets: [{ data: gE.map(e => parseFloat(e[1].toFixed(2))), backgroundColor: gE.map(e => e[1] >= 0 ? 'rgba(34,197,94,0.55)' : 'rgba(240,80,80,0.55)'), borderColor: gE.map(e => e[1] >= 0 ? '#22c55e' : '#f05050'), borderWidth: 1, borderRadius: 4 }] },
        options: { ...cDefaults, indexAxis: 'y',
          scales: { y: { grid: { display: false }, ticks: { color: '#ccdacc', font: { size: 12 } } }, x: { grid: { color: '#1c2e1c' }, ticks: { color: '#415a41', font: { family: 'IBM Plex Mono', size: 10 }, callback: v => '$' + v.toFixed(0) + '/hr' } } },
          plugins: { ...cDefaults.plugins, tooltip: { callbacks: { label: ctx => { const k = gE[ctx.dataIndex][0]; const hrs = (shmap[k]/60).toFixed(1); return `${fmtPnl(ctx.parsed.x)}/hr \u00b7 ${hrs}h logged`; } } } }
        }
      });
    }
  });
}

function initLog() {
  const pref = JSON.parse(localStorage.getItem('felt_pref') || '{}');
  calInit();
  document.getElementById('f-venue').value = '';
  document.getElementById('f-stakes').value = pref.stakes || '';
  document.getElementById('f-game').value = pref.game || 'NLH';
  document.getElementById('f-buyin').value = '';
  document.getElementById('f-cashout').value = '';
  document.getElementById('f-hours').value = '';
  document.getElementById('f-mins').value = '';
  updatePnl();
  venueAC();
}

function updatePnl() {
  const bi = parseFloat(document.getElementById('f-buyin').value) || 0;
  const co = parseFloat(document.getElementById('f-cashout').value) || 0;
  const el = document.getElementById('pnl-disp');
  if (!bi && !co) { el.style.color = 'var(--dim)'; el.textContent = '\u2014'; return; }
  const p = co - bi;
  el.style.color = p > 0 ? 'var(--green)' : p < 0 ? 'var(--red)' : 'var(--muted)';
  el.textContent = fmtPnl(p);
}
document.getElementById('f-buyin').addEventListener('input', updatePnl);
document.getElementById('f-cashout').addEventListener('input', updatePnl);

function venueAC() {
  const inp = document.getElementById('f-venue');
  const fg = document.getElementById('venue-fg');
  const venues = uniqVenues();
  const rmList = () => { const l = fg.querySelector('.ac-list'); if(l) l.remove(); };
  inp.addEventListener('input', () => {
    rmList();
    const v = inp.value.toLowerCase();
    if (!v || !venues.length) return;
    const ms = venues.filter(x => x.toLowerCase().includes(v));
    if (!ms.length) return;
    const list = document.createElement('div'); list.className = 'ac-list';
    ms.forEach(m => { const it = document.createElement('div'); it.className = 'ac-item'; it.textContent = m; it.onmousedown = e => { e.preventDefault(); inp.value = m; rmList(); }; list.appendChild(it); });
    fg.appendChild(list);
  });
  inp.addEventListener('blur', () => setTimeout(rmList, 200));
}

function normStakes(s) {
  s = s.trim();
  const m = {'1/2':'$1/$2','1/3':'$1/$3','2/5':'$2/$5','5/10':'$5/$10'};
  return m[s] || s;
}

// *** BUG FIX: added const date = ... (was missing, causing save to always fail) ***
function saveSession() {
  const date = document.getElementById('f-date').value;
  const venue = document.getElementById('f-venue').value.trim();
  const game = document.getElementById('f-game').value;
  const stakes = normStakes(document.getElementById('f-stakes').value.trim());
  const buyin = parseFloat(document.getElementById('f-buyin').value);
  const cashout = parseFloat(document.getElementById('f-cashout').value);
  const h = parseInt(document.getElementById('f-hours').value)||0;
  const m = parseInt(document.getElementById('f-mins').value)||0;
  if (!date || isNaN(buyin) || isNaN(cashout)) { alert('Please fill in date, buy-in, and cash-out.'); return; }
  sessions.push({ id: uid(), date, venue, game, stakes, buyin, cashout, dur: h*60+m });
  save();
  localStorage.setItem('felt_pref', JSON.stringify({ game, stakes }));
  const p = cashout - buyin;
  const btn = document.getElementById('save-btn');
  btn.textContent = `\u2713 ${fmtPnl(p)} Saved!`;
  btn.style.background = p >= 0 ? '#22c55e' : '#f05050';
  btn.style.color = '#fff';
  setTimeout(() => { btn.textContent = 'SAVE SESSION'; btn.style.background = 'var(--gold)'; btn.style.color = '#060c06'; initLog(); }, 1600);
}

function renderHistory() {
  const vs = document.getElementById('filt-venue');
  const gs = document.getElementById('filt-game');
  const vv = vs.value, gv = gs.value;
  vs.innerHTML = '<option value="">All Venues</option>' + uniqVenues().map(v => `<option value="${escH(v)}" ${v===vv?'selected':''}>${escH(v)}</option>`).join('');
  gs.innerHTML = '<option value="">All Games</option>' + uniqGames().map(g => `<option value="${escH(g)}" ${g===gv?'selected':''}>${escH(g)}</option>`).join('');
  let data = [...sessions].sort((a,b) => b.date.localeCompare(a.date));
  if (vv) data = data.filter(s => s.venue === vv);
  if (gv) data = data.filter(s => s.game === gv);
  const sumEl = document.getElementById('hist-summary');
  const listEl = document.getElementById('sess-list');
  if (!data.length) {
    sumEl.innerHTML = '';
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">&#9827;</div><div class="empty-title">${sessions.length ? 'No matches' : 'No sessions yet'}</div><div class="empty-sub">${sessions.length ? 'Clear the filters to see all sessions.' : 'Log your first session!'}</div></div>`;
    return;
  }
  const total = data.reduce((s,x) => s + (x.cashout - x.buyin), 0);
  sumEl.innerHTML = `<div class="history-summary"><span class="hs-label">${data.length} session${data.length!==1?'s':''}</span><span class="hs-val ${pnlCls(total)}">${fmtPnl(total)}</span></div>`;
  listEl.innerHTML = data.map(s => {
    const p = s.cashout - s.buyin;
    const meta = [fmtDate(s.date), s.game + (s.stakes ? ' ' + s.stakes : ''), fmtDur(s.dur)].filter(Boolean).join(' \u00b7 ');
    return `<div class="scard"><div class="scard-info"><div class="scard-venue">${escH(s.venue||'Unknown')}</div><div class="scard-meta">${escH(meta)}</div></div><div class="scard-pnl ${pnlCls(p)}">${fmtPnl(p)}</div><button class="scard-del" onclick="delSession('${s.id}')" title="Delete">&times;</button></div>`;
  }).join('');
}

function delSession(id) {
  if (!confirm('Delete this session?')) return;
  sessions = sessions.filter(s => s.id !== id);
  save(); renderHistory();
}
const escH = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function exportCSV() {
  const hdr = ['Date','Venue','Game','Stakes','Buy-in','Cash-out','P&L','Duration (min)'];
  const rows = sessions.map(s => [s.date, s.venue||'', s.game, s.stakes||'', s.buyin, s.cashout, s.cashout-s.buyin, s.dur||''].map(v=>`"${v}"`).join(','));
  dl('felt-sessions.csv', 'text/csv', [hdr.join(','),...rows].join('\n'));
}
function exportJSON() { dl('felt-backup.json', 'application/json', JSON.stringify(sessions, null, 2)); }
function importJSON(inp) {
  const file = inp.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw 0;
      const ex = new Set(sessions.map(s => s.id));
      const added = data.filter(s => !ex.has(s.id));
      sessions = [...sessions, ...added]; save();
      alert(`Imported ${added.length} new session${added.length!==1?'s':''}.`);
    } catch { alert("Could not read file. Make sure it's a valid backup."); }
  };
  r.readAsText(file);
}
function clearAll() {
  if (!confirm('Delete ALL session data? This cannot be undone.')) return;
  if (!confirm('Last chance \u2014 are you sure?')) return;
  sessions = []; save(); alert('All data cleared.');
}
function dl(name, type, content) {
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([content], {type})), download: name });
  a.click(); URL.revokeObjectURL(a.href);
}

const manifest = { name: "Wooly's Poker Tracker", short_name: "Wooly's", start_url: '.', display: 'standalone', background_color: '#070d07', theme_color: '#070d07', icons: [{"src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj4KICA8cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjgwIiBmaWxsPSJ3aGl0ZSIvPgogIDx0ZXh0IHg9IjI1NiIgeT0iMzk1IiAKICAgIGZvbnQtZmFtaWx5PSJHZW9yZ2lhLCBUaW1lcyBOZXcgUm9tYW4sIHNlcmlmIiAKICAgIGZvbnQtc2l6ZT0iNDIwIiAKICAgIGZvbnQtd2VpZ2h0PSJib2xkIgogICAgZm9udC1zdHlsZT0iaXRhbGljIgogICAgdGV4dC1hbmNob3I9Im1pZGRsZSIgCiAgICBmaWxsPSIjMGEwYTBhIj5XPC90ZXh0Pgo8L3N2Zz4=", "sizes": "512x512", "type": "image/svg+xml"}] };
const mBlob = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type:'application/json'}));
const ml = document.createElement('link'); ml.rel = 'manifest'; ml.href = mBlob; document.head.appendChild(ml);

let calDate = new Date(); calDate.setHours(0,0,0,0);
let calViewYear, calViewMonth;

function calInit() {
  const now = new Date(); now.setHours(0,0,0,0);
  calDate = new Date(now); calViewYear = now.getFullYear(); calViewMonth = now.getMonth();
  setCalDate(calDate);
}
function setCalDate(d) {
  calDate = new Date(d); calDate.setHours(0,0,0,0);
  document.getElementById('f-date').value = calDate.toISOString().slice(0,10);
  const opts = { month: 'long', day: 'numeric', year: 'numeric' };
  document.getElementById('cal-display').textContent = calDate.toLocaleDateString('en-US', opts);
  renderCalGrid();
}
function toggleCal() {
  const drop = document.getElementById('cal-drop');
  const trigger = document.getElementById('cal-trigger');
  const open = drop.style.display === 'none';
  drop.style.display = open ? 'block' : 'none';
  trigger.classList.toggle('open', open);
  if (open) renderCalGrid();
}
function closeCal() {
  document.getElementById('cal-drop').style.display = 'none';
  document.getElementById('cal-trigger').classList.remove('open');
}
function renderCalGrid() {
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calViewYear, calViewMonth, 1);
  const lastDay = new Date(calViewYear, calViewMonth + 1, 0);
  const startDow = firstDay.getDay();
  const monthName = firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  let html = `<div class="cal-nav"><button class="cal-nav-btn" onmousedown="event.preventDefault();calPrev()">&lsaquo;</button><span class="cal-month-label">${monthName}</span><button class="cal-nav-btn" onmousedown="event.preventDefault();calNext()">&rsaquo;</button></div><div class="cal-grid">`;
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => { html += `<div class="cal-dow">${d}</div>`; });
  for (let i = 0; i < startDow; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const thisDay = new Date(calViewYear, calViewMonth, d);
    const isToday = thisDay.getTime() === today.getTime();
    const isSelected = thisDay.getTime() === calDate.getTime();
    const cls = ['cal-day', isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
    html += `<div class="${cls}" onmousedown="event.preventDefault();pickDay(${calViewYear},${calViewMonth},${d})">${d}</div>`;
  }
  html += `</div>`;
  document.getElementById('cal-drop').innerHTML = html;
}
function calPrev() { calViewMonth--; if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; } renderCalGrid(); }
function calNext() { calViewMonth++; if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; } renderCalGrid(); }
function pickDay(y, m, d) { calViewYear = y; calViewMonth = m; setCalDate(new Date(y, m, d)); closeCal(); }
document.addEventListener('click', e => { const fg = document.getElementById('cal-fg'); if (fg && !fg.contains(e.target)) closeCal(); });

initLog();

</script>
